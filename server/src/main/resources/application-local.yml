spring:
  datasource:
    url: jdbc:h2:file:./data/health-track-mvp;MODE=MySQL;DATABASE_TO_LOWER=TRUE;AUTO_SERVER=TRUE;NON_KEYWORDS=USER
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
  h2:
    console:
      enabled: true
springdoc:
  swagger-ui:
    enabled: true
  api-docs:
    enabled: true
app:
  jwt:
    secret: local-dev-only-secret-not-for-production-use-min32chars
  cors:
    allowed-origins: "*"
  seed:
    enabled: true
